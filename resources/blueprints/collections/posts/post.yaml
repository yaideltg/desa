title: Post
tabs:
  main:
    display: Main
    sections:
      -
        display: Content
        fields:
          -
            handle: title
            field:
              type: text
              display: Title
              required: true
              validate:
                - required
          -
            handle: slug
            field:
              type: slug
              display: Slug
              required: true
              validate:
                - required
          -
            handle: featured_image
            field:
              type: assets
              display: 'Featured Image'
              container: assets
              max_files: 1
              instructions: 'The main image for this post, shown in listings and at the top.'
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
              character_limit: 200
              instructions: 'A short summary shown in post listings.'
          -
            handle: content
            field:
              type: bard
              display: Content
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - quote
                - link
                - image
                - horizontalrule
              container: assets
              allow_source: true
              instructions: 'Rich content with support for images and embedded media.'
  sidebar:
    display: Sidebar
    sections:
      -
        display: Meta
        fields:
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              max_items: 1
          -
            handle: date
            field:
              type: date
              display: Date
              default: now
              required: true
