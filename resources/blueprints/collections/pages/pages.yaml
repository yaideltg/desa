title: Pages
tabs:
  main:
    display: Main
    sections:
      -
        display: Content
        fields:
          -
            handle: title
            field:
              type: text
              display: Title
              required: true
              validate:
                - required
          -
            handle: content
            field:
              type: bard
              display: Content
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - quote
                - link
                - image
              container: assets
              allow_source: true
          -
            handle: template
            field:
              type: template
              display: Template
