title: Pages
tabs:
  main:
    display: Main
    sections:
      -
        display: Content
        fields:
          -
            handle: title
            field:
              type: text
              display: Title
              required: true
              validate:
                - required
          -
            handle: content
            field:
              type: markdown
              display: Content
              instructions: 'Write legal page content in Markdown, with headings and paragraphs kept readable in the Control Panel.'
          -
            handle: template
            field:
              type: template
              display: Template
